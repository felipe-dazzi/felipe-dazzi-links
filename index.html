<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felipe Dazzi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0D0D0D;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 36px 20px 48px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Avatar */
    .avatar-wrap {
      width: 118px;
      height: 118px;
      border-radius: 50%;
      padding: 2.5px;
      background: linear-gradient(135deg, #C9A84C, #f0d080, #C9A84C);
      margin-bottom: 14px;
      box-shadow: 0 0 0 1px rgba(201,168,76,0.2);
    }
    .avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid #0D0D0D;
      display: block;
    }

    /* Nome */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 28px;
      color: #FFFFFF;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      text-align: center;
    }

    /* Subtítulo */
    .category {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 10px;
      color: #C9A84C;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }

    /* Frase em itálico */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 19px;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 300px;
      letter-spacing: 0.2px;
    }

    /* Linha separadora dourada */
    .divider-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C9A84C, transparent);
      margin: 0 auto 28px;
    }

    /* Botões */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 13px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 14px;
      background: #C9A84C;
      color: #0D0D0D;
      border: 1px solid rgba(201,168,76,0.4);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(201,168,76,0.22);
      background: #d4b055;
    }
    .link-btn:active { transform: translateY(0); }

    .link-btn .icon {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      background: rgba(0,0,0,0.12);
    }
    .link-btn .icon svg { width: 18px; height: 18px; }

    .link-btn .label { flex: 1; text-align: center; }
    .link-btn .label span {
      display: block;
      font-size: 9px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.5);
      margin-bottom: 2px;
    }

    .link-btn .arrow { flex-shrink: 0; opacity: 0.5; }

    /* Rodapé */
    .footer {
      margin-top: 44px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
