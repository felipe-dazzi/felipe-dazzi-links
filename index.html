<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felipe Dazzi</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #F5F5F0;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 28px 20px 40px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #1A56DB, #F5A623);
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(26,86,219,0.18);
    }
    .avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid #F5F5F0;
      display: block;
    }

    .name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: #0D0D0D;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      text-align: center;
    }

    .category {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 12px;
      color: #1A56DB;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 13px;
      color: #6B7280;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 20px;
      max-width: 280px;
      font-style: italic;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 12px 18px;
      border-radius: 16px;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .link-btn:hover { transform: translateY(-2px); }
    .link-btn:active { transform: translateY(0); }

    .link-btn .icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .link-btn .icon svg { width: 20px; height: 20px; }
    .link-btn .label { flex: 1; text-align: center; }
    .link-btn .label span {
      display: block; font-size: 10px; font-weight: 600;
      margin-bottom: 1px; font-family: 'Inter', sans-serif;
      letter-spacing: 0.8px; text-transform: uppercase;
    }
    .link-btn .arrow { flex-shrink: 0; opacity: 0.7; }

    /* 3h30 Club — WhatsApp verde escuro */
    .btn-club {
      background: #075E54;
      color: #FFFFFF;
      box-shadow: 0 4px 16px rgba(7,94,84,0.35);
    }
    .btn-club .icon { background: rgba(255,255,255,0.15); }
    .btn-club .label span { color: #25D366; }

    /* Ebook — verde escuro da landing page */
    .btn-ebook {
      background: #0d2818;
      color: #FFFFFF;
      box-shadow: 0 4px 16px rgba(13,40,24,0.4);
    }
    .btn-ebook .icon { background: rgba(74,222,128,0.2); }
    .btn-ebook .label span { color: #4ade80; }

    /* WhatsApp — verde claro */
    .btn-whatsapp {
      background: #25D366;
      color: #FFFFFF;
      box-shadow: 0 4px 16px rgba(37,211,102,0.35);
    }
    .btn-whatsapp .icon { background: rgba(255,255,255,0.2); }
    .btn-whatsapp .label span { color: rgba(255,255,255,0.8); }

    /* YouTube — vermelho */
    .btn-youtube {
      background: #FF0000;
      color: #FFFFFF;
      box-shadow: 0 4px 16px rgba(255,0,0,0.3);
    }
    .btn-youtube .icon { background: rgba(255,255,255,0.2); }
    .btn-youtube .label span { color: rgba(255,255,255,0.8); }

    /* Instagram — gradiente */
    .btn-instagram {
      background: linear-gradient(135deg, #833AB4, #C13584, #E1306C, #F77737);
      color: #FFFFFF;
      box-shadow: 0 4px 16px rgba(193,53,132,0.35);
    }
    .btn-instagram .icon { background: rgba(255,255,255,0.2); }
    .btn-instagram .label span { color: rgba(255,255,255,0.85); }

    /* TikTok — preto */
    .btn-tiktok {
      background: #010101;
      color: #FFFFFF;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-tiktok .icon { background: #1a1a1a; border: 1px solid #333; }
    .btn-tiktok .label span { color: #69C9D0; }

    .divider {
      width: 40px; height: 1px;
      background: #E5E5E0; border-radius: 2px; margin: 4px auto;
    }

    .footer {
      margin-top: 40px; font-size: 11px;
      color: #C0C0B8; text-align: center;
    }
  </style>
</head>
